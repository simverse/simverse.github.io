remote_theme           : "mmistakes/minimal-mistakes"
plugins:
  - jekyll-include-cache
locale                 : "ko-KR"
search                 : true # true, false (default)
# Site Author
author:
  links:
# Site Footer
footer:
  links:
# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true